name: Dry run

on:
  push:

jobs:
  login-logout:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - run: bundle exec ./palai.rb
        env:
          PALAI_USER: ${{ secrets.AG_LOGIN }}
          PALAI_PASSWORD: ${{ secrets.AG_PASSWORD }}
          DRY_RUN: true
